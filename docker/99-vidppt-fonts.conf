<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- 扫描自定义字体目录 -->
  <dir>/usr/local/share/fonts/custom</dir>

  <!-- 1) sans-serif: Noto Sans CJK SC → Droid Sans Fallback -->
  <alias binding="strong">
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans CJK SC</family>
      <family>Droid Sans Fallback</family>
    </prefer>
  </alias>

  <!-- 2) serif: Noto Serif CJK SC → Droid Sans Fallback -->
  <alias binding="strong">
    <family>serif</family>
    <prefer>
      <family>Noto Serif CJK SC</family>
      <family>Droid Sans Fallback</family>
    </prefer>
  </alias>

  <!-- 3) monospace 保持 Droid Sans Mono 作为等宽回退 -->
  <alias binding="strong">
    <family>monospace</family>
    <prefer><family>Droid Sans</family></prefer>
  </alias>

  <!-- 4) 中文语言内容 → 首选 Noto Sans CJK SC -->
  <match>
    <test name="lang" compare="contains"><string>zh</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans CJK SC</string>
    </edit>
  </match>
</fontconfig>
